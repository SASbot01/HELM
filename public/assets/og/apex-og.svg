<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="APEX — Empower real-time, AI-driven decisions.">
  <title>APEX Operations</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0B0D" />
      <stop offset="100%" stop-color="#06070A" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#D5DAE3" stop-opacity="0.20" />
      <stop offset="55%" stop-color="#9AA3B2" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#D5DAE3" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="plat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FAFBFE" />
      <stop offset="50%" stop-color="#D5DAE3" />
      <stop offset="100%" stop-color="#9AA3B2" />
    </linearGradient>
    <linearGradient id="cf1" x1="20" y1="20" x2="50" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FAFBFE" />
      <stop offset="55%"  stop-color="#D5DAE3" />
      <stop offset="100%" stop-color="#9AA3B2" />
    </linearGradient>
    <linearGradient id="cf2" x1="50" y1="8" x2="92" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8C0CC" />
      <stop offset="50%"  stop-color="#7A8494" />
      <stop offset="100%" stop-color="#4A5260" />
    </linearGradient>
    <linearGradient id="cf3" x1="50" y1="55" x2="50" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3A4250" />
      <stop offset="60%"  stop-color="#1E232C" />
      <stop offset="100%" stop-color="#0E1218" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Center glow -->
  <ellipse cx="600" cy="320" rx="600" ry="280" fill="url(#glow)" />

  <!-- Subtle perspective grid -->
  <g opacity="0.10" stroke="#9AA3B2" stroke-width="0.6" fill="none">
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="220" x2="1200" y2="220" />
    <line x1="0" y1="320" x2="1200" y2="320" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="520" x2="1200" y2="520" />
    <line x1="0"    y1="630" x2="500"  y2="120" />
    <line x1="200"  y1="630" x2="540"  y2="120" />
    <line x1="400"  y1="630" x2="580"  y2="120" />
    <line x1="600"  y1="630" x2="600"  y2="120" />
    <line x1="800"  y1="630" x2="620"  y2="120" />
    <line x1="1000" y1="630" x2="660"  y2="120" />
    <line x1="1200" y1="630" x2="700"  y2="120" />
  </g>

  <!-- Brand mark + wordmark, top-left -->
  <g transform="translate(80, 70)">
    <g transform="scale(0.75)">
      <path d="M 50 8 L 8 88 L 50 55 Z" fill="url(#cf1)" />
      <path d="M 50 8 L 50 55 L 92 88 Z" fill="url(#cf2)" />
      <path d="M 50 55 L 8 88 L 50 70 L 92 88 Z" fill="url(#cf3)" />
    </g>
    <text x="100" y="58" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="38" font-weight="600" fill="#F5F5F7" letter-spacing="6">APEX</text>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#9AA3B2" letter-spacing="3">APEX OPERATIONS</text>

  <!-- Headline -->
  <text x="600" y="305" text-anchor="middle" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="64" font-weight="500" fill="url(#plat)" letter-spacing="-1.6">Empower real-time,</text>
  <text x="600" y="385" text-anchor="middle" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="64" font-weight="500" fill="url(#plat)" letter-spacing="-1.6">AI-driven decisions.</text>

  <!-- Sub -->
  <text x="600" y="455" text-anchor="middle" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="22" font-weight="300" fill="#9AA0AB">From factory floors to the online world.</text>

  <!-- Bottom divider + meta -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#23252E" stroke-width="0.5" />
  <text x="80"   y="582" font-family="JetBrains Mono, monospace" font-size="13" fill="#9AA3B2" letter-spacing="2">12 ENGAGEMENTS · 7 GEOGRAPHIES · GLOBAL OPERATIONS</text>
  <text x="1120" y="582" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#9AA3B2" letter-spacing="1">apexoperations.ai</text>
</svg>
